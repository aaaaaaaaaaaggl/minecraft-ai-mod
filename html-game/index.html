<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Змейка</title>
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1e1e1e;
    font-family: Arial, sans-serif;
    color: #eee;
  }
  h1 {
    margin: 16px 0;
  }
  #board {
    background: #111;
    border: 4px solid #444;
    display: block;
  }
  #score {
    margin: 10px 0;
    font-size: 20px;
  }
  #overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.75);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
  }
  #overlay.show {
    display: flex;
  }
  button {
    margin-top: 16px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #4caf50;
    color: white;
  }
  button:hover {
    background: #45a049;
  }
  p {
    max-width: 400px;
    text-align: center;
    color: #aaa;
  }
</style>
</head>
<body>
  <h1>🐍 Змейка</h1>
  <div id="score">Счёт: 0</div>
  <canvas id="board" width="400" height="400"></canvas>
  <p>Управление: стрелки или WASD. Съедайте еду, не врезайтесь в стены и в себя.</p>

  <div id="overlay">
    <h2 id="overlayText">Игра окончена</h2>
    <button id="restartBtn">Начать заново</button>
  </div>

<script>
(() => {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlayText');
  const restartBtn = document.getElementById('restartBtn');

  const cellSize = 20;
  const cols = canvas.width / cellSize;
  const rows = canvas.height / cellSize;

  let snake, direction, nextDirection, food, score, gameOver, loopId;

  function randomCell() {
    return {
      x: Math.floor(Math.random() * cols),
      y: Math.floor(Math.random() * rows),
    };
  }

  function placeFood() {
    let cell;
    do {
      cell = randomCell();
    } while (snake.some(s => s.x === cell.x && s.y === cell.y));
    return cell;
  }

  function resetGame() {
    snake = [{ x: 8, y: 10 }, { x: 7, y: 10 }, { x: 6, y: 10 }];
    direction = { x: 1, y: 0 };
    nextDirection = direction;
    score = 0;
    gameOver = false;
    food = placeFood();
    scoreEl.textContent = 'Счёт: ' + score;
    overlay.classList.remove('show');
    if (loopId) clearInterval(loopId);
    loopId = setInterval(tick, 120);
  }

  function tick() {
    if (gameOver) return;

    direction = nextDirection;
    const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

    const hitWall = head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows;
    const hitSelf = snake.some(s => s.x === head.x && s.y === head.y);

    if (hitWall || hitSelf) {
      endGame();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = 'Счёт: ' + score;
      food = placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function endGame() {
    gameOver = true;
    clearInterval(loopId);
    overlayText.textContent = 'Игра окончена! Счёт: ' + score;
    overlay.classList.add('show');
  }

  function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#e63946';
    ctx.fillRect(food.x * cellSize, food.y * cellSize, cellSize, cellSize);

    snake.forEach((segment, i) => {
      ctx.fillStyle = i === 0 ? '#4caf50' : '#81c784';
      ctx.fillRect(segment.x * cellSize + 1, segment.y * cellSize + 1, cellSize - 2, cellSize - 2);
    });
  }

  const keyMap = {
    ArrowUp: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 },
    s: { x: 0, y: 1 },
    a: { x: -1, y: 0 },
    d: { x: 1, y: 0 },
  };

  document.addEventListener('keydown', (e) => {
    const newDir = keyMap[e.key];
    if (!newDir) return;
    if (newDir.x === -direction.x && newDir.y === -direction.y) return;
    nextDirection = newDir;
  });

  restartBtn.addEventListener('click', resetGame);

  resetGame();
})();
</script>
</body>
</html>
