name: MinecraftAI
version: 1.0.0
description: AI Chat Server для Minecraft
author: aaaaaaaaaaaggl
main: com.minecraft.ai.MinecraftAIPlugin

softdepend:
  - ProtocolLib

commands:
  ai:
    description: AI команды
    usage: /ai <enable|disable|status|help>
    aliases: [ai-cmd]
  ai_bot:
    description: AI Bot команды и меню управления
    usage: /ai_bot [menu|combat|spawn|despawn|sword]
  ai_menu:
    description: Открыть меню управления AI Bot
    usage: /ai_menu
    aliases: [aimenu]

permissions:
  minecraft.ai.use:
    description: Разрешить использование AI команд
    default: true
  minecraft.ai.admin:
    description: Администраторские команды AI
    default: op
